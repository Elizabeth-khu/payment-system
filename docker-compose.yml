version: '3.8'
services:
  user-db:
    image: postgres:16
    container_name: user-postgres
    environment:
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - microservices-net

  auth-db:
    image: postgres:16
    container_name: auth-postgres
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    ports:
      - "5433:5432"
    networks:
      - microservices-net

  order-postgres:
    image: postgres:16-alpine
    container_name: order-postgres
    environment:
      POSTGRES_USER: ${ORDER_DB_USER:-order_admin}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
      POSTGRES_DB: order_db
    ports:
      - "5434:5432"
    networks:
      - microservices-net

  user-redis:
    image: redis:7.2-alpine
    container_name: user-redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - microservices-net

  user-app:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://user-db:5432/${USER_DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${USER_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${USER_DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - user-db
      - user-redis
    networks:
      - microservices-net

  auth-app:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service-app
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://auth-db:5432/${AUTH_DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${AUTH_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${AUTH_DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - auth-db
    networks:
      - microservices-net

  order-service-app:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service-app
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: ${ORDER_DB_USER:-order_admin}
      SPRING_DATASOURCE_PASSWORD: ${ORDER_DB_PASSWORD}
      USER_SERVICE_URL: http://user-app:8080
    depends_on:
      - order-postgres
      - user-app
    networks:
      - microservices-net

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    environment:
      - AUTH_SERVICE_URL=http://auth-app:8081
      - USER_SERVICE_URL=http://user-app:8080
      - ORDER_SERVICE_URL=http://order-service-app:8082
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8000:8000"
    depends_on:
      - auth-app
      - user-app
      - order-service-app
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge