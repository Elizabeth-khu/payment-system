services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=user_db'
      - 'POSTGRES_PASSWORD=secret_password'
      - 'POSTGRES_USER=user_admin'
    ports:
      - '5433:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_admin -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5