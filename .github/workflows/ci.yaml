name: User Service CI Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and run Unit/Integration Tests
        run: ./gradlew :user-service:build

      - name: Checkstyle (Code Quality)
        run: ./gradlew :user-service:checkstyleMain :user-service:checkstyleTest
        continue-on-error: true