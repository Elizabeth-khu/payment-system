name: User Service CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and run Unit/Integration Tests
        run: ./gradlew :user-service:build

      - name: SonarQube Analysis
        run: ./gradlew :user-service:sonar
        continue-on-error: true

      - name: Build Docker Image
        run: docker build -t innowise/user-service:latest -f user-service/Dockerfile .